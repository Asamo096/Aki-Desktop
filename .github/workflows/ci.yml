name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y meson ninja-build g++ libwayland-dev libwlroots-dev libglvnd-dev libinput-dev libxkbcommon-dev libpixman-1-dev libsystemd-dev libpam-dev liblua5.4-dev

    - name: Configure build
      run: meson setup build

    - name: Build
      run: meson compile -C build

    - name: Run tests
      run: meson test -C build

  lint:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Install clang-format
      run: sudo apt-get update && sudo apt-get install -y clang-format

    - name: Run clang-format
      run: clang-format -i src/**/*.cpp include/**/*.h

    - name: Check for changes
      run: git diff --exit-code
